<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f4f6f9; }
        .navbar { background-color: #2c3e50; padding: 15px; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 4px; }
        .container { padding: 30px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; background-color: #008744; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="../index.html">Dashboard</a>
        <a href="product.html">Products</a>
        <a href="sales.html">Sales</a>
        <a href="reports.html">Reports</a>
    </div>

    <div class="container">
        <h2>Add New Product</h2>
        <!-- Form ID must be productForm -->
        <form id="productForm">
            <div class="form-group">
                <label>Product Name:</label>
                <input type="text" id="productName" placeholder="e.g., Laptop" required>
            </div>
            <div class="form-group">
                <label>Price ($):</label>
                <input type="number" id="productPrice" placeholder="e.g., 500" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Quantity:</label>
                <input type="number" id="productQty" placeholder="e.g., 10" required>
            </div>
            <button type="submit" class="btn">Add Product</button>
        </form>
    </div>

    <!-- Script connection to handle localStorage savings -->
    <script src="../js/script.js"></script>
</body>
</html>
