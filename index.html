<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f4f6f9; }
        .navbar { background-color: #2c3e50; padding: 15px; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 4px; }
        .navbar a:hover { background-color: #34495e; }
        .container { padding: 30px; }
        .dashboard-grid { display: flex; gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; border-left: 5px solid #008744; }
        .card.orange { border-left-color: #e67e22; }
        .card.blue { border-left-color: #2980b9; }
        .card h3 { margin: 0; color: #666; font-size: 14px; text-transform: uppercase; }
        .card h1 { margin: 10px 0 0 0; color: #333; font-size: 32px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html">Dashboard</a>
        <a href="pages/product.html">Products</a>
        <a href="pages/sales.html">Sales</a>
        <a href="pages/reports.html">Reports</a>
        <a href="#" onclick="localStorage.clear(); window.location.href='login.html';" style="margin-left: auto; background-color: #c0392b;">Logout</a>
    </div>

    <div class="container">
        <h2>Inventory Dashboard</h2>
        
        <div class="dashboard-grid">
            <!-- Box 1: Product Types -->
            <div class="card">
                <h3>Total Product Types</h3>
                <h1 id="totalProductTypes">0</h1>
            </div>
            
            <!-- Box 2: Stock Value -->
            <div class="card orange">
                <h3>Total Stock Value</h3>
                <h1 id="totalStockValue">$0.00</h1>
            </div>

            <!-- Box 3: Sales Revenue -->
            <div class="card blue">
                <h3>Total Sales Revenue</h3>
                <h1 id="totalSalesRevenue">$0.00</h1>
            </div>
        </div>
    </div>

    <!-- Linking Dashboard Script -->
    <script src="js/dashboard.js"></script>
</body>
</html>
