<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container" id="loginContainer">
    <!-- Logo section -->
    <img src="images/logo.jpg" alt="App Logo" style="width: 100px; display: block; margin: 0 auto 15px;">
    
    <h2>Login Portal</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        <p style="text-align: center; margin-top: 15px;">
            Don't have an account? <a href="#" id="showSignup">Sign up Here</a>
        </p>
    </form>
</div>

<!-- Sign Up Form -->
<div class="signup-container" id="signupContainer" style="display: none;">
    <h2>Create Account</h2>
    <form id="signupForm">
        <div class="input-group">
            <label for="newusername">Choose Username</label>
            <input type="text" id="newusername" required>
        </div>
        <div class="input-group">
            <label for="newpassword">Choose Password</label>
            <input type="password" id="newpassword" required>
        </div>
        <button type="submit" class="btn-login">Register</button>
        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="#" id="showLogin">Back to Login</a>
        </p>
    </form>
</div>

<script src="js/login.js"></script>
</body>
</html>
