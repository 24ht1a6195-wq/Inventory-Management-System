<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container, #signUpContainer {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }
        h2 { text-align: center; margin-bottom: 25px; color: #333333; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #666666; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; }
        .btn-login {
            width: 100%; padding: 12px; background-color: #008744; color: white;
            border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-login:hover { background-color: #006633; }
        p a { color: #008744; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN FORM -->
    <div class="login-container">
        <h2>Login Portal</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
            <p style="text-align: center; margin-top: 15px;">
                Don't have an account? <a href="#" id="showSignUp">Sign Up Here</a>
            </p>
        </form>
    </div>

    <!-- SIGN UP FORM -->
    <div id="signUpContainer" style="display: none;">
        <h2>Create Account</h2>
        <form id="signUpForm">
            <div class="input-group">
                <label for="newUsername">Choose Username:</label>
                <input type="text" id="newUsername" placeholder="Enter new username" required>
            </div>
            <div class="input-group">
                <label for="newPassword">Choose Password:</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
            <button type="submit" class="btn-login" style="background-color: #0056b3;">Register</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="#" id="showLogin">Back to Login</a>
            </p>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
