<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        form { max-width: 400px; margin: auto; }
        input { width: 100%; padding: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Add New Product</h2>
    <form>
        <label>Product Name:</label>
        <input type="text" placeholder="Enter fruit name" required>
        
        <label>Upload Image:</label>
        <input type="file" accept="image/*">
        
        <button type="button" onclick="alert('Product Added Successfully!')">Save Product</button>
        <a href="product.html"><button type="button" style="background-color: grey;">Back</button></a>
    </form>
</body>
</html>
