<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Page</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f4f6f9; }
        .navbar { background-color: #2c3e50; padding: 15px; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 4px; }
        .container { padding: 30px; max-width: 600px; margin: auto; background: white; margin-top: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group select, .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background-color: #008744; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn:hover { background-color: #006633; }
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="../index.html">Dashboard</a>
        <a href="product.html">Products</a>
        <a href="sales.html">Sales</a>
        <a href="reports.html">Reports</a>
    </div>

    <div class="container">
        <h2>Sales Page</h2>
        <form id="salesForm">
            <div class="form-group">
                <label for="salesProductSelect">Select Product:</label>
                <select id="salesProductSelect" required>
                    <option value="">-- Choose Product --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="salesQuantity">Quantity to Sell:</label>
                <input type="number" id="salesQuantity" placeholder="e.g. 5" min="1" required>
            </div>
            
            <button type="submit" class="btn">Sell Product</button>
        </form>

        <div class="history-section">
            <h3>Sales History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Quantity Sold</th>
                        <th>Total Revenue</th>
                    </tr>
                </thead>
                <tbody id="salesHistoryTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="../js/sales.js"></script>
</body>
</html>
